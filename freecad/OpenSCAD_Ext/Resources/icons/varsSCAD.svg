<?xml version="1.0" encoding="UTF-8"?>
<!--
  varsSCAD.svg  —  Extract SCAD Variables to Spreadsheet
  64×64 px  |  OpenSCAD_Ext workbench

  Design: gold SCAD-code document with a teal "spreadsheet" badge.
  The teal grid badge (3-column, 3-row table) signals "extract data
  into a spreadsheet".  Teal/green = data/output.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fce94f"/>
      <stop offset="100%" stop-color="#c4a000"/>
    </linearGradient>
  </defs>

  <!-- ── Document body ── -->
  <rect x="6" y="4" width="34" height="44" rx="3"
        fill="url(#dg)" stroke="#302b00" stroke-width="2"/>

  <!-- Folded top-right corner -->
  <path d="M 34,4 L 40,10 L 34,10 Z"
        fill="#8f6800" stroke="#302b00" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="34" y1="4" x2="40" y2="10" stroke="#302b00" stroke-width="1.5"/>

  <!-- Code lines -->
  <line x1="11" y1="20" x2="36" y2="20" stroke="#302b00" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="27" x2="34" y2="27" stroke="#302b00" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="34" x2="30" y2="34" stroke="#302b00" stroke-width="2" stroke-linecap="round"/>

  <!-- ── Vars badge: teal circle + white spreadsheet grid ── -->
  <circle cx="50" cy="50" r="12" fill="#16a085" stroke="#302b00" stroke-width="1.5"/>

  <!-- Spreadsheet outer border -->
  <rect x="40" y="43" width="19" height="14" rx="1"
        fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Header row separator -->
  <line x1="40" y1="47.5" x2="59" y2="47.5" stroke="white" stroke-width="1.5"/>
  <!-- Second row separator -->
  <line x1="40" y1="52"   x2="59" y2="52"   stroke="white" stroke-width="1"/>
  <!-- Column dividers -->
  <line x1="46" y1="43"   x2="46" y2="57"   stroke="white" stroke-width="1"/>
  <line x1="53" y1="43"   x2="53" y2="57"   stroke="white" stroke-width="1"/>
</svg>
