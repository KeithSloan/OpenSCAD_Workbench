<?xml version="1.0" encoding="UTF-8"?>
<!--
  editStudioScadFileObj.svg  —  OpenSCAD Studio (Edit in OpenSCAD GUI)
  64×64 px  |  OpenSCAD_Ext workbench

  Design: gold SCAD-code document page with a purple "studio" badge.
  Purple monitor badge signals "open in an IDE / graphical application".
  The monitor shows two code lines to reinforce the coding context.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fce94f"/>
      <stop offset="100%" stop-color="#c4a000"/>
    </linearGradient>
  </defs>

  <!-- ── Document body ── -->
  <rect x="6" y="4" width="34" height="44" rx="3"
        fill="url(#dg)" stroke="#302b00" stroke-width="2"/>

  <!-- Folded top-right corner -->
  <path d="M 34,4 L 40,10 L 34,10 Z"
        fill="#8f6800" stroke="#302b00" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="34" y1="4" x2="40" y2="10" stroke="#302b00" stroke-width="1.5"/>

  <!-- Code lines -->
  <line x1="11" y1="20" x2="36" y2="20" stroke="#302b00" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="27" x2="34" y2="27" stroke="#302b00" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="34" x2="30" y2="34" stroke="#302b00" stroke-width="2" stroke-linecap="round"/>

  <!-- ── Studio badge: purple circle + white monitor icon ── -->
  <circle cx="50" cy="50" r="12" fill="#75507b" stroke="#302b00" stroke-width="1.5"/>

  <!-- Monitor screen bezel -->
  <rect x="42" y="43" width="16" height="10" rx="1.5"
        fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Screen content (two code lines) -->
  <line x1="44" y1="47"   x2="56" y2="47"   stroke="white" stroke-width="1" opacity="0.8"/>
  <line x1="44" y1="49.5" x2="54" y2="49.5" stroke="white" stroke-width="1" opacity="0.8"/>
  <!-- Neck -->
  <line x1="50" y1="53" x2="50" y2="56" stroke="white" stroke-width="1.5"/>
  <!-- Stand base -->
  <line x1="46" y1="56" x2="54" y2="56" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
