<?xml version="1.0" encoding="UTF-8"?>
<!--
  editScadFileObj.svg  —  Edit SCAD File Object
  64×64 px  |  OpenSCAD_Ext workbench

  Design: gold SCAD-code document page with a blue "edit" badge.
  Blue pencil badge (bottom-right) universally signals "edit/modify".
  Also used by the Library Browser command (shared for now).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fce94f"/>
      <stop offset="100%" stop-color="#c4a000"/>
    </linearGradient>
  </defs>

  <!-- ── Document body ── -->
  <rect x="6" y="4" width="34" height="44" rx="3"
        fill="url(#dg)" stroke="#302b00" stroke-width="2"/>

  <!-- Folded top-right corner -->
  <path d="M 34,4 L 40,10 L 34,10 Z"
        fill="#8f6800" stroke="#302b00" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="34" y1="4" x2="40" y2="10" stroke="#302b00" stroke-width="1.5"/>

  <!-- Code lines -->
  <line x1="11" y1="20" x2="36" y2="20" stroke="#302b00" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="27" x2="34" y2="27" stroke="#302b00" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="34" x2="30" y2="34" stroke="#302b00" stroke-width="2" stroke-linecap="round"/>

  <!-- ── Edit badge: blue circle + white pencil ── -->
  <circle cx="50" cy="50" r="12" fill="#3465a4" stroke="#302b00" stroke-width="1.5"/>

  <!-- Pencil at −45° (eraser top-right, tip bottom-left) -->
  <g transform="translate(50,50) rotate(-45)">
    <!-- Eraser cap -->
    <rect x="-3" y="-10" width="6" height="3" rx="0.5"
          fill="#d3d7cf" stroke="#302b00" stroke-width="0.8"/>
    <!-- Pencil body -->
    <rect x="-3" y="-7" width="6" height="11" rx="0"
          fill="white" stroke="#302b00" stroke-width="0.8"/>
    <!-- Pencil tip -->
    <polygon points="-3,4 3,4 0,9"
             fill="#fce94f" stroke="#302b00" stroke-width="0.8"/>
  </g>
</svg>
