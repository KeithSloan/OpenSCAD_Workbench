<?xml version="1.0" encoding="UTF-8"?>
<!--
  OpenSCAD_Ext.svg — Workbench Icon  64×64 px
  Flat-colour isometric cube (Qt SVG renderer compatible — no gradients).
  Top face bright orange, left face mid-orange, right face dark brown.
  Matches the OpenSCAD colour palette.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="64" height="64" viewBox="0 0 64 64">

  <!-- Drop shadow -->
  <ellipse cx="32" cy="61" rx="22" ry="3" fill="#000000" fill-opacity="0.25"/>

  <!-- Right face (dark — shadow side) -->
  <polygon points="32,32 56,18 56,44 32,58"
           fill="#7A4400" stroke="#1A1200" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Left face (mid tone) -->
  <polygon points="8,18 32,32 32,58 8,44"
           fill="#B07000" stroke="#1A1200" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Top face (highlight) -->
  <polygon points="32,4 56,18 32,32 8,18"
           fill="#F0A800" stroke="#1A1200" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Top-face glint line (left edge) -->
  <line x1="32" y1="4" x2="8" y2="18"
        stroke="#FFCE50" stroke-width="1.0" stroke-opacity="0.7"/>

  <!-- Cylindrical bore — opening on top face -->
  <ellipse cx="32" cy="18" rx="9" ry="5.5"
           fill="#160E00" stroke="#1A1200" stroke-width="1.5"/>

  <!-- Bore depth (visible below top face) -->
  <ellipse cx="32" cy="24" rx="9" ry="5.5"
           fill="#0A0600"/>

  <!-- Bore rim highlight -->
  <path d="M 24,16 Q 32,12 40,16"
        fill="none" stroke="#F0A800" stroke-width="1.0"
        stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Vertical edges -->
  <line x1="8"  y1="18" x2="8"  y2="44"
        stroke="#1A1200" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="56" y1="18" x2="56" y2="44"
        stroke="#1A1200" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="32" y2="58"
        stroke="#1A1200" stroke-width="1.5" stroke-linecap="round"/>

</svg>
